events {
    worker_connections 1024;
}

http {
    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=payment_limit:10m rate=20r/m;

    upstream worker_service     { server worker-service:8001; }
    upstream policy_service     { server policy-service:8002; }
    upstream trigger_engine     { server trigger-engine:8003; }
    upstream claims_service     { server claims-service:8004; }
    upstream payment_service    { server payment-service:8005; }
    upstream notification_svc   { server notification-service:8006; }
    upstream risk_engine        { server risk-engine:8007; }
    upstream fraud_engine       { server fraud-engine:8008; }
    upstream analytics_service  { server analytics-service:8009; }

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "DENY";
        add_header X-Content-Type-Options "nosniff";

        # Health check (no rate limit)
        location /health {
            return 200 '{"status":"ok","gateway":"kavachai-api-gateway"}';
            add_header Content-Type application/json;
        }

        # ── Worker Service ──────────────────────
        location /api/v1/riders {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://worker_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/zones {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://worker_service;
            proxy_set_header Host $host;
        }

        # ── Policy Service ──────────────────────
        location /api/v1/policies {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://policy_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/premium {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://policy_service;
            proxy_set_header Host $host;
        }

        # ── Trigger Engine ──────────────────────
        location /api/v1/trigger {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://trigger_engine;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/triggers {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://trigger_engine;
            proxy_set_header Host $host;
        }

        # ── Claims Service ──────────────────────
        location /api/v1/claims {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://claims_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Payment Service ─────────────────────
        location /api/v1/payments {
            limit_req zone=payment_limit burst=5 nodelay;
            proxy_pass http://payment_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Notification Service ────────────────
        location /api/v1/notifications {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://notification_svc;
            proxy_set_header Host $host;
        }

        # ── Analytics Service ───────────────────
        location /api/v1/analytics {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://analytics_service;
            proxy_set_header Host $host;
        }

        # ── Service Docs (FastAPI OpenAPI) ──────
        location /docs/ {
            proxy_pass http://worker_service/docs;
        }
    }
}
