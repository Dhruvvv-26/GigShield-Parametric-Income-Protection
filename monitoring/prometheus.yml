global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: development
    project: kavachai

scrape_configs:

  - job_name: worker-service
    static_configs:
      - targets: ['worker-service:8001']
    metrics_path: /metrics

  - job_name: policy-service
    static_configs:
      - targets: ['policy-service:8002']
    metrics_path: /metrics

  - job_name: trigger-engine
    static_configs:
      - targets: ['trigger-engine:8003']
    metrics_path: /metrics

  - job_name: redpanda
    static_configs:
      - targets: ['redpanda:9644']
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
